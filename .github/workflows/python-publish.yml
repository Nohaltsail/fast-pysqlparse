name: Publish to PyPI

on:
  release:
    types: [published]
  
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi
      version:
        description: 'Version (optional, will use pyproject.toml)'
        required: false

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.10"
            target-binary: pysqlparser.cp310-win_amd64.pyd
            py-tag: cp310
            abi-tag: cp310
            platform-tag: win_amd64
          - os: windows-latest
            python-version: "3.11"
            target-binary: pysqlparser.cp311-win_amd64.pyd
            py-tag: cp311
            abi-tag: cp311
            platform-tag: win_amd64
          - os: windows-latest
            python-version: "3.12"
            target-binary: pysqlparser.cp312-win_amd64.pyd
            py-tag: cp312
            abi-tag: cp312
            platform-tag: win_amd64
          - os: windows-latest
            python-version: "3.13"
            target-binary: pysqlparser.cp313-win_amd64.pyd
            py-tag: cp313
            abi-tag: cp313
            platform-tag: win_amd64
          - os: windows-latest
            python-version: "3.14"
            target-binary: pysqlparser.cp314-win_amd64.pyd
            py-tag: cp314
            abi-tag: cp314
            platform-tag: win_amd64
          - os: ubuntu-latest
            python-version: "3.10"
            target-binary: pysqlparser.cpython-310-x86_64-linux-gnu.so
            py-tag: cp310
            abi-tag: cp310
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - os: ubuntu-latest
            python-version: "3.11"
            target-binary: pysqlparser.cpython-311-x86_64-linux-gnu.so
            py-tag: cp311
            abi-tag: cp311
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - os: ubuntu-latest
            python-version: "3.12"
            target-binary: pysqlparser.cpython-312-x86_64-linux-gnu.so
            py-tag: cp312
            abi-tag: cp312
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - os: ubuntu-latest
            python-version: "3.13"
            target-binary: pysqlparser.cpython-313-x86_64-linux-gnu.so
            py-tag: cp313
            abi-tag: cp313
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64
          - os: ubuntu-latest
            python-version: "3.14"
            target-binary: pysqlparser.cpython-314-x86_64-linux-gnu.so
            py-tag: cp314
            abi-tag: cp314
            platform-tag: manylinux_2_17_x86_64.manylinux2014_x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine wheel

      - name: Keep only target binary
        run: |
          python - <<'PY'
          from pathlib import Path
          target = "${{ matrix.target-binary }}"
          pkg = Path("fastsqlparse")
          target_path = pkg / target
          if not target_path.exists():
              raise SystemExit(f"Missing target binary: {target_path}")

          for path in pkg.glob("pysqlparser*"):
              if path.suffix not in {".pyd", ".so"}:
                  continue
              if path.name != target:
                  path.unlink()

          remaining = sorted(
              p.name for p in pkg.glob("pysqlparser*") if p.suffix in {".pyd", ".so"}
          )
          print("Remaining binaries:", remaining)
          if remaining != [target]:
              raise SystemExit(f"Expected only {target}, got {remaining}")
          PY

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel contains one binary
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          target = "fastsqlparse/${{ matrix.target-binary }}"
          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected one wheel, found {len(wheels)}")

          with zipfile.ZipFile(wheels[0]) as zf:
              ext_files = sorted(
                  n for n in zf.namelist()
                  if n.startswith("fastsqlparse/pysqlparser") and (n.endswith(".so") or n.endswith(".pyd"))
              )
          print("Wheel extension files:", ext_files)
          if ext_files != [target]:
              raise SystemExit(f"Unexpected extension files: {ext_files}")
          PY

      - name: Retag wheel for target platform/ABI
        run: |
          python -m wheel tags \
            --python-tag ${{ matrix.py-tag }} \
            --abi-tag ${{ matrix.abi-tag }} \
            --platform-tag ${{ matrix.platform-tag }} \
            --remove \
            dist/*.whl

      - name: Check wheel
        run: twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  aggregate-dists:
    name: Aggregate distributions
    runs-on: ubuntu-latest
    needs: [build-wheels]

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true


      - name: Show final dist files
        run: ls -l dist/

      - name: Validate release wheel set (10 wheels, one binary each)
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheels = sorted(dist.glob("*.whl"))

          if len(wheels) != 10:
              raise SystemExit(f"Expected exactly 10 wheels, found {len(wheels)}: {[w.name for w in wheels]}")

          required_pairs = {
              ("cp310", "cp310", "win"),
              ("cp311", "cp311", "win"),
              ("cp312", "cp312", "win"),
              ("cp313", "cp313", "win"),
              ("cp314", "cp314", "win"),
              ("cp310", "cp310", "linux"),
              ("cp311", "cp311", "linux"),
              ("cp312", "cp312", "linux"),
              ("cp313", "cp313", "linux"),
              ("cp314", "cp314", "linux"),
          }

          found_pairs = set()

          for wheel in wheels:
              stem = wheel.stem
              parts = stem.split("-")
              if len(parts) < 5:
                  raise SystemExit(f"Unexpected wheel filename format: {wheel.name}")

              py_tag = parts[-3]
              abi_tag = parts[-2]
              platform_tag = parts[-1]

              if platform_tag.endswith("win_amd64"):
                  platform_kind = "win"
                  expected_suffix = ".pyd"
              elif "manylinux" in platform_tag:
                  platform_kind = "linux"
                  expected_suffix = ".so"

                  tokens = set(platform_tag.split("."))
                  required_linux_tokens = {"manylinux2014_x86_64", "manylinux_2_17_x86_64"}
                  if tokens != required_linux_tokens:
                      raise SystemExit(
                          f"Unexpected linux platform tag tokens in {wheel.name}: {sorted(tokens)}"
                      )
              else:
                  raise SystemExit(f"Unsupported platform tag in wheel: {wheel.name}")

              found_pairs.add((py_tag, abi_tag, platform_kind))

              with zipfile.ZipFile(wheel) as zf:
                  ext_files = [
                      n for n in zf.namelist()
                      if n.startswith("fastsqlparse/pysqlparser") and (n.endswith(".pyd") or n.endswith(".so"))
                  ]

              if len(ext_files) != 1:
                  raise SystemExit(
                      f"Wheel {wheel.name} must contain exactly one pysqlparser extension, found: {ext_files}"
                  )

              if not ext_files[0].endswith(expected_suffix):
                  raise SystemExit(
                      f"Wheel {wheel.name} expected extension {expected_suffix}, found {ext_files[0]}"
                  )

          if found_pairs != required_pairs:
              missing = sorted(required_pairs - found_pairs)
              extra = sorted(found_pairs - required_pairs)
              raise SystemExit(
                  f"Wheel pair set mismatch. Missing: {missing}; Extra: {extra}"
              )

          print("Validation passed: 10/10 wheels with one correct extension each.")
          PY

      - name: Upload release distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # publish to PyPI（when manual or  update release）
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [aggregate-dists]
    if: |
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi')
    
    permissions:
      id-token: write
    
    environment:
      name: pypi
      url: https://pypi.org/project/fast-pysqlparse/
    
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  testpypi-publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [aggregate-dists]
    if: |
      github.event_name == 'workflow_dispatch' && 
      github.event.inputs.environment == 'testpypi'
    
    permissions:
      id-token: write
    
    environment:
      name: testpypi
      url: https://test.pypi.org/project/fast-pysqlparse/
    
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
